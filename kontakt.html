    <div>
      <h2 class="sr-only">Kontakt</h2>
    </div>

    <main class="py-12">
      <div
        class="container mx-auto flex flex-col gap-8 md:flex-row items-center justify-center"
      >
        <section class="my-grid text-center md:text-balance">
          <div class="card">
            <a
              href="[linkedin.com](https://www.linkedin.com/in/josefin-c-025524192/)"
              target="_blank"
            >
              <i class="fa-brands fa-linkedin"></i> Linkedin</a
            >
          </div>
          <div>
            <p>josefin.carlsson@yh.nackademin.se</p>
          </div>
          <div class="flex items-center justify-center">
            <p><i class="fa-solid fa-phone"></i> 0703438159</p>
          </div>
          <div class="card">
            <a
              class="text-xl"
              href="[canva.link](https://canva.link/d4qute2c2o8yeat)"
              target="_blank"
              ><i class="fa-regular fa-file text-3xl font-semibold"></i> Mitt
              CV</a
            >
          </div>
        </section>
        <form
          class="p-12 bg-purple-50 rounded-2xl border border-purple-300 shadow-sm w-full md:w-1/2"
        >
          <h2 class="text-lg font-medium mb-4">
            Skriv in dina uppgifter så kontaktar jag dig!
          </h2>
          <fieldset class="mb-4">
            <label for="name" class="block mb-2 font-semibold">Namn</label>
            <input
              class="border border-gray-400 p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-purple-300"
              id="name"
              type="text"
              placeholder="Jane Doe"
              required
            />
          </fieldset>
          <fieldset class="mb-4">
            <label for="email" class="block mb-2 font-semibold">E‑post</label>
            <input
              class="border border-gray-400 p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-purple-300"
              id="email"
              type="email"
              placeholder="jane.doe@example.com"
              required
            />
          </fieldset>
          <fieldset class="mb-4">
            <label for="message" class="block mb-2 font-semibold"
              >Meddelande</label
            >
            <textarea
              class="border border-gray-400 p-2 w-full rounded h-32"
              id="message"
              placeholder="Skriv ett meddelande här..."
            ></textarea>
          </fieldset>
          <button
            class="border border-gray-400 rounded-sm bg-slate-200 px-6 py-2 hover:bg-slate-300 transition"
            type="submit"
          >
            Skicka
          </button>
        </form>
      </div>
    </main>
    <footer class="flex items-left bg-slate-300 p-6 mt-24">
      <h2 class="sr-only">Sidfot</h2>
      <ul>
        <h3>Kontaktuppgifter</h3>
        <li class="flex justify-start px-10">
          <a
            href="https://www.linkedin.com/in/josefin-c-025524192"
            target="_blank"
          >
            Linkedin</a
          >
        </li>
        <li class="flex justify-start px-10">
          <p>josefin.carlsson@yh.nackademin.se</p>
        </li>
        <li class="flex justify-start px-10">
          <p>0703438159</p>
        </li>
      </ul>
    </footer>
